### ### DTK DEPLOYMENT PROTOCOL V2.0.2 ###
name: Build and Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {} # Manual trigger button

# Environment variables to opt-in to latest GitHub Runner engines
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent simultaneous deployments from conflicting
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Speeds up subsequent builds

      - name: Install dependencies
        run: npm ci # Uses package-lock.json for a clean, consistent build

      - name: Build Clinical Kernel
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to Sovereign Edge
        id: deployment
        uses: actions/deploy-pages@v4
### ### END PROTOCOL ###
