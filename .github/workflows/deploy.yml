### ### DTK DEPLOYMENT PROTOCOL V2.0 ###
name: Build and Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {} # Manual trigger button

  # Add this section to silence the deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

permissions:
  contents: read
  pages: write
  id-token: write

# Prevent simultaneous deployments from conflicting
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Speeds up subsequent builds

      - name: Install dependencies
        run: npm ci # Faster, cleaner install for CI environments

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
### ### END PROTOCOL ###
