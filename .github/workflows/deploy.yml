### ### DTK DEPLOYMENT PROTOCOL V2.0.3 ###
name: Build and Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {} # Manual trigger button

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true # Stabilized for Node 20 LTS

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Clinical Kernel
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    # This block solves the "Missing environment" (Status 400) error
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Sovereign Edge
        id: deployment
        uses: actions/deploy-pages@v4
### ### END PROTOCOL ###
